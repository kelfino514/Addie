/* ── Auth Gate ─────────────────────────────────────────────────
   Passkey-first sign-in, with the email magic link as bootstrap + fallback.
   Rendered only when sync is configured and there's no session yet.
   - Passkey: signInWithPasskey runs the WebAuthn ceremony (no email needed);
     works once a passkey exists on this device / synced via the OS keychain.
   - Email link: needed the first time (to create the account so a passkey
     can be added from inside the app) and whenever a passkey isn't available. */
const AuthGate = () => {
  const[view,setView]=useState('home'); // 'home' | 'email' | 'sent'
  const[email,setEmail]=useState('');
  const[busy,setBusy]=useState('');     // '' | 'passkey' | 'email'
  const[err,setErr]=useState('');
  const INPUT={width:'100%',border:'1.5px solid #E0D8D0',borderRadius:9,padding:'11px 13px',fontSize:14,outline:'none',color:'#2A2825',background:'#FCFBF9',marginBottom:12,display:'block'};
  const BTN=(b,solid=true)=>({width:'100%',background:b?'#8A8078':solid?'#2A2825':'white',color:solid?'#F4F1ED':'#2A2825',border:solid?'none':'1.5px solid #D8D0C8',borderRadius:9,padding:'11px',fontSize:14,fontWeight:500,cursor:b?'default':'pointer'});
  const LINK={background:'none',border:'none',color:'#9A9088',fontSize:12,cursor:'pointer',marginTop:14,textDecoration:'underline'};
  const doPasskey=async()=>{
    setBusy('passkey');setErr('');
    try{const{error}=await signInWithPasskey();if(error)throw error;/* onAuthStateChange takes over */}
    catch(ex){setErr('No passkey was used. If this is a new device, sign in with an email link first, then add a passkey from inside the app.');setBusy('');}
  };
  const doEmail=async()=>{
    const e=email.trim();
    if(!e){setErr('Enter your email.');return;}
    setBusy('email');setErr('');
    try{const{error}=await sendMagicLink(e);if(error)throw error;setView('sent');}
    catch(ex){setErr(ex?.message||'Could not send the link.');}
    finally{setBusy('');}
  };
  return html`
    <div style=${{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#F4F1ED',padding:20}}>
      <div style=${{background:'white',borderRadius:16,padding:'30px 30px 26px',width:'min(380px,92vw)',boxShadow:'0 16px 48px rgba(0,0,0,0.12)'}}>
        <div style=${{fontFamily:"'DM Serif Display',serif",fontSize:24,marginBottom:6}}>Planner</div>
        ${view==='home'?html`
          <div style=${{fontSize:13,color:'#7A7068',marginBottom:22,lineHeight:1.5}}>Sign in to sync your planner across devices.</div>
          <button onClick=${doPasskey} disabled=${!!busy} style=${BTN(busy==='passkey')}>${busy==='passkey'?'Waiting for passkey…':'🔑  Sign in with a passkey'}</button>
          <button onClick=${()=>{setView('email');setErr('');}} disabled=${!!busy} style=${{...BTN(false,false),marginTop:10}}>Use an email link instead</button>
        `:view==='email'?html`
          <div style=${{fontSize:13,color:'#7A7068',marginBottom:18,lineHeight:1.5}}>We'll email you a one-time sign-in link.</div>
          <input type="email" autoFocus value=${email} onInput=${e=>setEmail(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter')doEmail();}}
            placeholder="you@email.com" style=${INPUT}/>
          <button onClick=${doEmail} disabled=${!!busy} style=${BTN(busy==='email')}>${busy==='email'?'Sending…':'Email me a sign-in link'}</button>
          <button onClick=${()=>{setView('home');setErr('');}} style=${LINK}>← Back</button>
        `:html`
          <div style=${{fontSize:13,color:'#7A7068',marginBottom:18,lineHeight:1.55}}>Check your inbox — we emailed a sign-in link to <b>${email.trim()}</b>. Open it <b>on this device</b> to finish signing in, then add a passkey for next time.</div>
          <button onClick=${doEmail} disabled=${!!busy} style=${BTN(busy==='email')}>${busy==='email'?'Sending…':'Resend link'}</button>
          <button onClick=${()=>{setView('email');setErr('');}} style=${LINK}>Use a different email</button>
        `}
        ${err&&html`<div style=${{color:'#A0291E',fontSize:12,marginTop:12,lineHeight:1.4}}>${err}</div>`}
      </div>
    </div>`;
};

/* Registers a passkey on the current device for the signed-in user. Shown in
   the header so the user can opt in per device / ecosystem. */
const PASSKEY_FLAG='passkey-added';
const AddPasskeyButton = () => {
  // Remember success per device so reopening doesn't re-prompt (re-registering
  // on an authenticator that already has one throws InvalidStateError).
  const[st,setSt]=useState(()=>{try{return localStorage.getItem(PASSKEY_FLAG)?'done':'';}catch(e){return '';}});
  const markDone=()=>{try{localStorage.setItem(PASSKEY_FLAG,'1');}catch(e){}setSt('done');};
  const add=async()=>{
    setSt('busy');
    try{const{error}=await registerPasskey();if(error)throw error;markDone();}
    catch(ex){
      const m=(((ex&&ex.name)||'')+' '+((ex&&ex.message)||'')).toLowerCase();
      // "already exists on this authenticator" → treat as done, not an error.
      if(m.includes('invalidstate')||m.includes('already')||m.includes('exclude'))markDone();
      else setSt('err');
    }
  };
  if(st==='done')return html`<span style=${{fontSize:12,color:'#5E9E5E',whiteSpace:'nowrap'}} title="A passkey is set up on this device">✓ Passkey on</span>`;
  return html`<button onClick=${add} disabled=${st==='busy'}
    title="Register a passkey on this device for faster sign-in next time"
    style=${{background:'none',border:'1px solid #E0D8D0',borderRadius:16,padding:'6px 12px',fontSize:12,color:st==='err'?'#A0291E':'#7A7068',cursor:st==='busy'?'default':'pointer',whiteSpace:'nowrap'}}>
    ${st==='busy'?'Adding…':st==='err'?'Retry passkey':'＋ Add passkey'}</button>`;
};

/* Draggable divider that resizes an adjacent side panel. dir=+1 grows the
   panel when dragged right (left/Master panel), dir=-1 grows it when dragged
   left (right/Brain panel). maxByWindow keeps the center from being squeezed. */
const PanelResizer = ({width,setWidth,dir,min,max,maxByWindow}) => {
  const[hov,setHov]=useState(false);
  const onDown=e=>{
    e.preventDefault();
    const startX=e.clientX,startW=width;
    const move=ev=>{
      const hi=Math.min(max,maxByWindow?maxByWindow():max);
      setWidth(Math.round(Math.max(min,Math.min(hi,startW+dir*(ev.clientX-startX)))));
    };
    const up=()=>{
      window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);
      document.body.style.cursor='';document.body.style.userSelect='';
    };
    window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);
    document.body.style.cursor='col-resize';document.body.style.userSelect='none';
  };
  return html`<div onPointerDown=${onDown} onMouseEnter=${()=>setHov(true)} onMouseLeave=${()=>setHov(false)}
    title="Drag to resize" role="separator"
    style=${{width:7,flexShrink:0,cursor:'col-resize',touchAction:'none',position:'relative',display:'flex',justifyContent:'center',background:'transparent'}}>
    <div style=${{width:hov?3:1,background:hov?'#B8AE9E':'#EAE4DC',transition:'width 0.12s, background 0.12s'}}/>
  </div>`;
};

const App = () => {
  const[state,setState]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[session,setSession]=useState(null);
  const[authReady,setAuthReady]=useState(!syncEnabled); // local-only: nothing to wait for
  const[syncStatus,setSyncStatus]=useState(syncEnabled?'connecting':'off'); // off|connecting|synced
  const[masterCollapsed,setMasterCollapsed]=useState(false);
  const[expandedIds,setExpandedIds]=useState(new Set());
  const[addingProject,setAddingProject]=useState(false);
  const[newProjectName,setNewProjectName]=useState('');
  const[openColorPickerId,setOpenColorPickerId]=useState(null);
  const[calCollapsed,setCalCollapsed]=useState(false);
  const[brainyCollapsed,setBrainyCollapsed]=useState(false);
  const[masterWidth,setMasterWidth]=useState(()=>loadPrefs().masterWidth||260);
  const[brainWidth,setBrainWidth]=useState(()=>loadPrefs().brainWidth||312);
  useEffect(()=>{savePrefs({...loadPrefs(),masterWidth,brainWidth});},[masterWidth,brainWidth]);
  const[insights,setInsights]=useState(SAMPLE_INSIGHTS);
  const fileRef=useRef(null);
  const debouncedSaveRef=useRef(debounce(saveState,1200));
  const debouncedSave=debouncedSaveRef.current;
  const skipSave=useRef(false); // suppress the save-echo when state arrives FROM the server
  const channelRef=useRef(null);
  const bootedRef=useRef(false);

  // Seed the app from a state blob (local cache or server). Expands every project.
  const bootState=saved=>{
    if(saved){const s=purgeOldCompleted(saved);setState(s);setExpandedIds(new Set(s.projects?.map(p=>p.id)||[]));}
    else{const s=makeSeed();setState(s);setExpandedIds(new Set(s.projects.map(p=>p.id)));}
    setLoaded(true);
  };
  // A change pushed by ANOTHER device. Adopt it without echoing a save back up.
  const adoptRemote=(data,ts)=>{
    const s=purgeOldCompleted(data);
    saveLocal(s,ts||new Date().toISOString());
    skipSave.current=true;
    setState(s);
    setExpandedIds(prev=>{const n=new Set(prev);(s.projects||[]).forEach(p=>{if(!prev.has(p.id))n.add(p.id);});return n;});
  };
  // First sign-in or returning: reconcile local cache vs server (newer wins),
  // migrate local up if the server has nothing yet. Hardened so it ALWAYS ends
  // with setLoaded(true) — the app must never get stuck on "Loading…".
  const bootSynced=async userId=>{
    _syncUserId=userId;
    try{
      const local=loadLocal(),localTs=loadLocalTs();
      let row=null,reachable=false;
      try{row=await withTimeout(pullRemote(userId),8000);reachable=true;}catch(e){}
      const hasRemote=row&&row.data&&Object.keys(row.data).length;
      let chosen,chosenTs;
      if(hasRemote&&local&&localTs&&row.updated_at&&new Date(localTs).getTime()>new Date(row.updated_at).getTime()){
        chosen=local;chosenTs=localTs;try{await withTimeout(pushRemote(userId,local,localTs),8000);}catch(e){}
      }else if(hasRemote){
        chosen=row.data;chosenTs=row.updated_at;
      }else if(local){
        chosen=local;chosenTs=localTs||new Date().toISOString();try{await withTimeout(pushRemote(userId,local,chosenTs),8000);}catch(e){}
      }else{
        chosen=makeSeed();chosenTs=new Date().toISOString();try{await withTimeout(pushRemote(userId,chosen,chosenTs),8000);}catch(e){}
      }
      const s=purgeOldCompleted(chosen);
      saveLocal(s,chosenTs);
      skipSave.current=true; // we already pushed during boot — don't re-push on first render
      setState(s);
      setExpandedIds(new Set(s.projects?.map(p=>p.id)||[]));
      setSyncStatus(reachable?'synced':'connecting');
    }catch(e){
      bootState(loadLocal()); // last-ditch: render from local so we never hang
    }finally{
      setLoaded(true);
    }
  };

  // Auth wiring: ONLY mirror session state here. Never await another Supabase
  // call inside onAuthStateChange — it runs while GoTrue holds its lock, so a
  // PostgREST/auth call would deadlock (the stuck-on-Loading bug). Boot happens
  // in the effect below, reacting to `session`, outside the lock.
  useEffect(()=>{
    if(!syncEnabled){bootState(loadLocal());return;}
    let authSub=null,cancelled=false;
    (async()=>{
      const supa=await getSupa();
      const{data:{subscription}}=supa.auth.onAuthStateChange((_e,sess)=>{
        if(!cancelled){setSession(sess);setAuthReady(true);}
      });
      authSub=subscription;
      const{data:{session:sess}}=await supa.auth.getSession();
      if(!cancelled){setSession(sess);setAuthReady(true);}
    })();
    return ()=>{cancelled=true;try{authSub?.unsubscribe();}catch(e){}};
  },[]);

  // Boot + realtime react to the session — runs OUTSIDE the auth callback.
  useEffect(()=>{
    if(!syncEnabled)return;
    if(session&&!bootedRef.current){
      bootedRef.current=true;
      const uid=session.user.id;
      (async()=>{
        await bootSynced(uid);
        try{channelRef.current=await subscribeRemote(uid,adoptRemote);}catch(e){}
      })();
    }else if(!session&&bootedRef.current){ // signed out — tear down, back to the gate
      bootedRef.current=false;_syncUserId=null;
      if(channelRef.current){getSupa().then(s=>{try{s.removeChannel(channelRef.current);}catch(e){}channelRef.current=null;});}
      setLoaded(false);setState(null);setSyncStatus('connecting');
    }
  },[session]);

  // Persist on every change — but skip the render that came FROM the server.
  useEffect(()=>{
    if(!loaded||!state)return;
    if(skipSave.current){skipSave.current=false;return;}
    debouncedSave(state);
  },[state,loaded]);

  const Loading=t=>html`<div style=${{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'#B0A898',fontSize:14}}>${t}</div>`;
  if(syncEnabled&&!authReady)return Loading('Connecting…');
  if(syncEnabled&&!session)return html`<${AuthGate}/>`;
  if(!loaded||!state)return Loading('Loading…');

  const{projects,priorityIds=[],completedExpanded=false,weeksToShow=1}=state;
  const upState=p=>setState(s=>({...s,...p}));
  const setWeeks=n=>upState({weeksToShow:n});
  const upProjects=p=>upState({projects:p});
  const upProject=u=>upProjects(projects.map(p=>p.id===u.id?u:p));
  const delProject=id=>{upProjects(projects.filter(p=>p.id!==id));setExpandedIds(prev=>{const n=new Set(prev);n.delete(id);return n;});};
  const addProject=()=>{
    if(!newProjectName.trim())return;
    const color=PROJECT_COLORS[5+(projects.length%6)];
    const np={id:uid(),name:newProjectName.trim(),color,tasks:[],reminders:[],events:[],notes:[]};
    upProjects([...projects,np]);setExpandedIds(prev=>new Set([...prev,np.id]));
    setNewProjectName('');setAddingProject(false);
  };
  const toggleExp=id=>setExpandedIds(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  const masterToggleDone=(pid,tid)=>upProjects(projects.map(p=>{if(p.id!==pid)return p;const tasks=p.tasks.map(t=>t.id===tid?{...t,done:!t.done,archived:false,completedAt:!t.done?Date.now():null}:t);return{...p,tasks:[...tasks.filter(t=>!t.done),...tasks.filter(t=>t.done)]};}));
  const masterToggleReminderDone=(pid,rid)=>upProjects(projects.map(p=>{if(p.id!==pid)return p;const reminders=(p.reminders||[]).map(r=>r.id===rid?{...r,done:!r.done,archived:false,completedAt:!r.done?Date.now():null}:r);return{...p,reminders:[...reminders.filter(r=>!r.done),...reminders.filter(r=>r.done)]};}));
  const masterToggleEventDone=(pid,eid)=>upProjects(projects.map(p=>{if(p.id!==pid)return p;const events=(p.events||[]).map(e=>e.id===eid?{...e,done:!e.done,archived:false,completedAt:!e.done?Date.now():null}:e);return{...p,events:[...events.filter(e=>!e.done),...events.filter(e=>e.done)]};}));
  const togglePriority=tid=>{const a=priorityIds.includes(tid);upState({priorityIds:a?priorityIds.filter(x=>x!==tid):[...priorityIds,tid]});};
  const reorderPriority=(fromId,toId)=>{const a=[...priorityIds];const fi=a.indexOf(fromId),ti=a.indexOf(toId);if(fi!==-1&&ti!==-1){[a[fi],a[ti]]=[a[ti],a[fi]];upState({priorityIds:a});}};
  const emptyCompleted=()=>{setState(s=>{const projects=s.projects.map(p=>({...p,tasks:p.tasks.filter(t=>!t.archived),reminders:(p.reminders||[]).filter(r=>!r.archived),events:(p.events||[]).filter(e=>!e.archived)}));const liveIds=new Set(projects.flatMap(p=>p.tasks.map(t=>t.id)));return{...s,projects,priorityIds:s.priorityIds.filter(id=>liveIds.has(id))};});};
  const assignDayToTask=(pid,tid,day,time,end)=>upProjects(projects.map(p=>p.id===pid?{...p,tasks:p.tasks.map(t=>t.id===tid?{...t,dueDate:day,taskTime:time,endTime:end}:t)}:p));
  // Master-list assign: route to tasks OR reminders by which list the id belongs to.
  const assignDayFromMaster=(pid,id,day,time,end)=>upProjects(projects.map(p=>{
    if(p.id!==pid)return p;
    if(p.tasks.some(t=>t.id===id))return{...p,tasks:p.tasks.map(t=>t.id===id?{...t,dueDate:day,taskTime:time,endTime:end}:t)};
    if((p.reminders||[]).some(r=>r.id===id))return{...p,reminders:(p.reminders||[]).map(r=>r.id===id?{...r,dueDate:day,taskTime:time,endTime:end}:r)};
    return p;
  }));

  /* ── Brainy → Planner bridge ──────────────────────────────────
     This is the integration: a suggestion becomes a real planner
     item (tagged fromBrainy) and immediately flows everywhere the
     planner reads from state — master list, project strip, calendar. */
  const addInsightToPlanner=(insight,projectId,kind,important=false)=>{
    const newId=uid();
    const {text:cleanText,due}=extractDue(insight.text); // honor a trailing @date
    setState(s=>{
      const projects=s.projects.map(p=>{
        if(p.id!==projectId)return p;
        if(kind==='note')return{...p,notes:[...p.notes,{id:newId,title:(insight.noteTitle||'').trim(),text:cleanText,color:important?'#FFF3BF':defaultNoteColor(p.color),gradientStep:null,checklistItems:[],collapsed:false,fromBrainy:true}]};
        const base={id:newId,text:cleanText,done:false,fromBrainy:true};
        if(kind==='reminder')return{...p,reminders:[...(p.reminders||[]),{...base,flagged:important,dueDate:due,taskTime:null,endTime:null}]};
        if(kind==='event')return{...p,events:[...(p.events||[]),{...base,important,dueDate:due,taskTime:null,endTime:null}]};
        return{...p,tasks:[...p.tasks,due?{...base,dueDate:due}:base]};
      });
      // Tasks express "important" via the priority list.
      const priorityIds=(kind==='task'&&important)?[...(s.priorityIds||[]),newId]:s.priorityIds;
      return{...s,projects,priorityIds};
    });
    if(!expandedIds.has(projectId))setExpandedIds(prev=>new Set([...prev,projectId]));
    setInsights(prev=>prev.filter(i=>i.id!==insight.id));
  };
  const addInsightToExistingNote=(insight,projectId,noteId)=>{
    setState(s=>({...s,projects:s.projects.map(p=>{
      if(p.id!==projectId)return p;
      return{...p,notes:p.notes.map(n=>{
        if(n.id!==noteId)return n;
        const add=extractDue(insight.text).text;
        const sep=(n.text&&n.text.trim())?'\n':'';
        // Append as a new bullet, and expand the note so the new line is visible + sized.
        return{...n,text:(n.text||'')+sep+'• '+add,collapsed:false};
      })};
    })}));
    if(!expandedIds.has(projectId))setExpandedIds(prev=>new Set([...prev,projectId]));
    setInsights(prev=>prev.filter(i=>i.id!==insight.id));
  };
  const dismissInsight=id=>setInsights(prev=>prev.filter(i=>i.id!==id));
  const addCapturedInsights=items=>setInsights(prev=>[...items,...prev]);
  // Global sweep: archive every checked (done, not-yet-archived) item across all projects.
  const pendingAllCount=projects.flatMap(p=>[...p.tasks,...(p.reminders||[]),...(p.events||[])]).filter(it=>it.done&&!it.archived).length;
  const completeAll=()=>{
    const stamp=Date.now();
    const arch=it=>(it.done&&!it.archived)?{...it,archived:true,completedAt:stamp}:it;
    upProjects(projects.map(p=>({...p,tasks:p.tasks.map(arch),reminders:(p.reminders||[]).map(arch),events:(p.events||[]).map(arch)})));
  };

  return html`
    <div style=${{height:'100%',display:'flex',flexDirection:'column',background:'#F4F1ED'}}>
      <header style=${{padding:'12px 22px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid #EAE4DC',background:'#F4F1ED',flexShrink:0,zIndex:30,gap:10}}>
        <div style=${{fontFamily:"'DM Serif Display',serif",fontSize:21,letterSpacing:'-0.3px',flexShrink:0}}>Planner</div>
        <div style=${{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
          <button onClick=${()=>setAddingProject(true)} style=${{background:'#2A2825',color:'#F4F1ED',border:'none',borderRadius:16,padding:'6px 14px',fontSize:12,fontWeight:500,cursor:'pointer'}}>+ Project</button>
          ${pendingAllCount>0&&html`<button onClick=${completeAll}
            title="Archive all completed items across every project to Master Completed"
            style=${{display:'flex',alignItems:'center',gap:5,background:'none',color:'#5E7A5E',border:'1px solid #BBD0BB',borderRadius:16,padding:'6px 12px',fontSize:12,fontWeight:500,cursor:'pointer'}}>
            <svg width="11" height="9" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6L8 1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Complete all (${pendingAllCount})
          </button>`}
          <${OverflowMenu} items=${[
            {label:'Print',onClick:()=>{const h=buildPrintHTML(projects,priorityIds,completedExpanded);const w=window.open('','_blank');w.document.write(h);w.document.close();}},
            {label:'Export',onClick:()=>exportBackup(state)},
            {label:'Import',onClick:()=>fileRef.current?.click()},
          ]}/>
          <input ref=${fileRef} type="file" accept=".json" style=${{display:'none'}} onChange=${e=>{const f=e.target.files?.[0];if(f)importBackup(f,s=>{setState(s);setExpandedIds(new Set(s.projects?.map(p=>p.id)||[]));});e.target.value='';}}/>
          ${syncEnabled&&session&&html`<div style=${{display:'flex',alignItems:'center',gap:7,marginLeft:2}}>
            <span title=${syncStatus==='synced'?'Synced across devices':'Connecting…'} style=${{width:8,height:8,borderRadius:'50%',background:syncStatus==='synced'?'#5E9E5E':'#C9A227',flexShrink:0}}/>
            <${AddPasskeyButton}/>
            <button onClick=${()=>signOutSync()} title=${'Signed in as '+(session.user?.email||'')+' — sign out'}
              style=${{background:'none',border:'1px solid #E0D8D0',borderRadius:16,padding:'6px 12px',fontSize:12,color:'#7A7068',cursor:'pointer'}}>Sign out</button>
          </div>`}
        </div>
      </header>
      <div style=${{flex:1,display:'flex',overflow:'hidden'}}>
        <${MasterPanel} projects=${projects} priorityIds=${priorityIds}
          onToggleDone=${masterToggleDone} onTogglePriority=${togglePriority}
          onToggleReminderDone=${masterToggleReminderDone} onToggleEventDone=${masterToggleEventDone}
          onReorderPriority=${reorderPriority} onEmptyCompleted=${emptyCompleted}
          completedExpanded=${completedExpanded}
          onToggleCompleted=${()=>upState({completedExpanded:!completedExpanded})}
          onAssignDay=${assignDayFromMaster} weeks=${weeksToShow}
          collapsed=${masterCollapsed} onToggleCollapse=${()=>setMasterCollapsed(p=>!p)} width=${masterWidth}/>
        ${!masterCollapsed&&html`<${PanelResizer} width=${masterWidth} setWidth=${setMasterWidth} dir=${1} min=${180} max=${560}
          maxByWindow=${()=>window.innerWidth-(brainyCollapsed?30:brainWidth)-320}/>`}
        <div style=${{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <${WeekCalendar} projects=${projects} priorityIds=${priorityIds} weeks=${weeksToShow} onSetWeeks=${setWeeks}
            calCollapsed=${calCollapsed} onToggleCalendar=${()=>setCalCollapsed(p=>!p)}
            onAssignDay=${(tid,day,time,end,kind)=>{
              if(kind==='event'){
                const proj=projects.find(p=>(p.events||[]).some(e=>e.id===tid));
                if(proj)upProjects(projects.map(p=>p.id===proj.id?{...p,events:(p.events||[]).map(e=>e.id===tid?{...e,dueDate:day,taskTime:time,endTime:end}:e)}:p));
              } else if(kind==='reminder'){
                const proj=projects.find(p=>(p.reminders||[]).some(r=>r.id===tid));
                if(proj)upProjects(projects.map(p=>p.id===proj.id?{...p,reminders:(p.reminders||[]).map(r=>r.id===tid?{...r,dueDate:day,taskTime:time,endTime:end}:r)}:p));
              } else {
                const proj=projects.find(p=>p.tasks.some(t=>t.id===tid));
                if(proj)assignDayToTask(proj.id,tid,day,time,end);
              }
            }}/>
          <div style=${{flex:1,overflowY:'auto',overflowX:'hidden',padding:'16px 20px 40px'}}>
          ${addingProject&&html`<div style=${{background:'white',borderRadius:14,padding:'11px 15px',display:'flex',gap:10,alignItems:'center',boxShadow:'0 1px 4px rgba(0,0,0,0.07)',border:'1.5px solid #2A2825',marginBottom:12}}>
            <input autoFocus value=${newProjectName} onInput=${e=>setNewProjectName(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter')addProject();if(e.key==='Escape'){setAddingProject(false);setNewProjectName('');}}} placeholder="Project name…" style=${{flex:1,border:'none',outline:'none',fontSize:14,background:'none',color:'#2A2825'}}/>
            <button onClick=${addProject} style=${{background:'#2A2825',color:'white',border:'none',borderRadius:7,padding:'5px 12px',fontSize:12,cursor:'pointer'}}>Add</button>
            <button onClick=${()=>{setAddingProject(false);setNewProjectName('');}} style=${{background:'none',border:'none',color:'#9A9088',fontSize:18,lineHeight:1,cursor:'pointer'}}>×</button>
          </div>`}
          ${projects.length===0&&!addingProject&&html`<div style=${{textAlign:'center',padding:'60px 20px',color:'#B0A898',fontSize:13}}><div style=${{fontSize:26,marginBottom:12,opacity:0.4}}>▤</div>No projects yet — add one above.</div>`}
          <${DraggableProjects} projects=${projects} onReorder=${upProjects}
            renderProject=${(p)=>html`<${ProjectStrip} project=${p} onUpdate=${upProject} onDelete=${delProject} isExpanded=${expandedIds.has(p.id)} onToggle=${()=>toggleExp(p.id)} priorityIds=${priorityIds} onTogglePriority=${togglePriority} masterCollapsed=${masterCollapsed} openColorPickerId=${openColorPickerId} setOpenColorPickerId=${setOpenColorPickerId} weeks=${weeksToShow}/>`}/>
          </div>
        </div>
        ${!brainyCollapsed&&html`<${PanelResizer} width=${brainWidth} setWidth=${setBrainWidth} dir=${-1} min=${240} max=${600}
          maxByWindow=${()=>window.innerWidth-(masterCollapsed?28:masterWidth)-320}/>`}
        <${BrainySidebar} insights=${insights} projects=${projects}
          onAdd=${addInsightToPlanner} onAddToNote=${addInsightToExistingNote} onDismiss=${dismissInsight} onCapture=${addCapturedInsights}
          onReorder=${setInsights} width=${brainWidth}
          collapsed=${brainyCollapsed} onToggleCollapse=${()=>setBrainyCollapsed(p=>!p)}/>
      </div>
    </div>`;
};

render(html`<${App}/>`, document.getElementById('root'));
</script>
</body>
</html>
