/* A standalone calendar event chip (not tied to a project). Spans multiple
   days as a colored bar — name shown on the first day only, plain color on the
   continuation days. Hover reveals an × to delete the whole event. */
const CalEventChip = ({ev,isStart,onEdit,onDelete,onDragStart}) => {
  const[hov,setHov]=useState(false);
  const fyi=ev.color===FYI_COLOR;
  return html`<div onMouseEnter=${()=>setHov(true)} onMouseLeave=${()=>setHov(false)}
    draggable=${!!onDragStart} onDragStart=${onDragStart} onClick=${()=>onEdit&&onEdit(ev)} title="Edit event"
    style=${{position:'relative',background:ev.color,borderRadius:4,padding:'2px 5px',marginBottom:3,minHeight:15,display:'flex',alignItems:'center',cursor:'pointer',
      borderLeft:isStart?`2px solid ${darken(ev.color)}`:'none',opacity:fyi?0.85:1}}>
    <span style=${{fontSize:9.5,color:fyi?'#6A625A':'#2A2825',fontStyle:fyi?'italic':'normal',lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>
      ${isStart?ev.text:' '}
    </span>
    ${hov&&onDelete&&html`<button onClick=${e=>{e.stopPropagation();onDelete(ev.id);}} title="Delete event"
      style=${{position:'absolute',right:1,top:'50%',transform:'translateY(-50%)',background:'rgba(255,255,255,0.75)',border:'none',borderRadius:3,color:'#A0291E',fontSize:11,lineHeight:1,cursor:'pointer',padding:'0 3px'}}>×</button>`}
  </div>`;
};

/* Modal form for creating a standalone calendar event: name, start/end dates
   (native date inputs — reliable on iPad), and a color incl. the FYI gray. */
const CalEventForm = ({event,onSave,onDelete,onClose}) => {
  const today=todayISO();
  const[name,setName]=useState(event?event.text:'');
  const[start,setStart]=useState(event?event.startDate:today);
  const[end,setEnd]=useState(event?(event.endDate||event.startDate):today);
  const[color,setColor]=useState(event?event.color:CAL_EVENT_COLORS[0]);
  const inp={border:'1px solid #E0D8D0',borderRadius:7,padding:'7px 9px',fontSize:13,outline:'none',color:'#2A2825',background:'white',width:'100%'};
  const submit=()=>{const t=name.trim();if(!t)return;let s=start||today,e=end||s;if(e<s)e=s;onSave({...(event||{}),text:t,startDate:s,endDate:e,color});onClose();};
  return html`
    <div style=${{position:'fixed',inset:0,zIndex:3000,background:'rgba(42,40,37,0.45)',display:'flex',alignItems:'center',justifyContent:'center'}} onClick=${onClose}>
      <div onClick=${e=>e.stopPropagation()} style=${{background:'white',borderRadius:14,padding:'20px 22px',width:'min(360px,92vw)',boxShadow:'0 16px 48px rgba(0,0,0,0.2)'}}>
        <div style=${{fontFamily:"'DM Serif Display',serif",fontSize:18,marginBottom:14}}>${event?'Edit calendar event':'New calendar event'}</div>
        <input autoFocus value=${name} onInput=${e=>setName(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter')submit();}} placeholder="Event name…" style=${{...inp,marginBottom:12}}/>
        <div style=${{display:'flex',gap:10,marginBottom:14}}>
          <label style=${{flex:1,fontSize:11,color:'#7A7068',fontWeight:600}}>Start<input type="date" value=${start} onInput=${e=>{setStart(e.target.value);if(end<e.target.value)setEnd(e.target.value);}} style=${{...inp,marginTop:4}}/></label>
          <label style=${{flex:1,fontSize:11,color:'#7A7068',fontWeight:600}}>End<input type="date" value=${end} min=${start} onInput=${e=>setEnd(e.target.value)} style=${{...inp,marginTop:4}}/></label>
        </div>
        <div style=${{fontSize:11,color:'#7A7068',fontWeight:600,marginBottom:7}}>Color</div>
        <div style=${{display:'flex',gap:7,flexWrap:'wrap',marginBottom:18}}>
          ${CAL_EVENT_COLORS.map(c=>html`<div key=${c} onClick=${()=>setColor(c)} title=${c===FYI_COLOR?'FYI / gray':'Event color'}
            style=${{width:26,height:26,borderRadius:'50%',background:c,cursor:'pointer',flexShrink:0,position:'relative',border:color===c?'2.5px solid #2A2825':'1.5px solid rgba(0,0,0,0.12)'}}>
            ${c===FYI_COLOR&&html`<span style=${{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:7.5,color:'#6A625A',fontWeight:700}}>FYI</span>`}</div>`)}
        </div>
        <div style=${{display:'flex',gap:10,alignItems:'center',justifyContent:'space-between'}}>
          ${event&&onDelete?html`<button onClick=${()=>{onDelete(event.id);onClose();}} style=${{background:'none',border:'none',color:'#A0291E',fontSize:13,cursor:'pointer',fontWeight:500}}>Delete</button>`:html`<span/>`}
          <div style=${{display:'flex',gap:10}}>
            <button onClick=${onClose} style=${{background:'#F0EBE5',color:'#2A2825',border:'none',borderRadius:8,padding:'8px 16px',fontSize:13,cursor:'pointer',fontWeight:500}}>Cancel</button>
            <button onClick=${submit} style=${{background:'#2A2825',color:'white',border:'none',borderRadius:8,padding:'8px 16px',fontSize:13,cursor:'pointer',fontWeight:500}}>${event?'Save':'Add event'}</button>
          </div>
        </div>
      </div>
    </div>`;
};

const WeekCalendar = ({projects,priorityIds,calCollapsed,onToggleCalendar,onAssignDay,weeks=1,onSetWeeks,calendarEvents=[],onSaveCalendarEvent,onDeleteCalendarEvent,calHeight=null,onSetCalHeight,zoom=1}) => {
  const weekDates=getWeekDates(weeks);
  const today=new Date().getDay();
  const[pickerTask,setPickerTask]=useState(null);
  const[pickerPos,setPickerPos]=useState({top:0,left:0});
  const[eventForm,setEventForm]=useState(null); // null=closed | 'new' (add) | event object (edit)
  // Drag the bar under the calendar to set a fixed height (per-device pref);
  // null = automatic (sized by content). Works the same with 1 week or 4.
  const rowsRef=useRef(null);
  const startHeightDrag=e=>{
    if(!onSetCalHeight)return;
    e.preventDefault();
    const startY=e.clientY;
    const startH=calHeight||(rowsRef.current?rowsRef.current.getBoundingClientRect().height/zoom:210);
    const noSel=v=>{document.body.style.userSelect=v;document.body.style.webkitUserSelect=v;};
    const move=ev=>onSetCalHeight(Math.round(Math.max(70,Math.min(window.innerHeight*0.75/zoom,startH+(ev.clientY-startY)/zoom))));
    const up=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);document.body.style.cursor='';noSel('');};
    window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);
    document.body.style.cursor='ns-resize';noSel('none');
  };
  // With a fixed height each week-row gets an equal share; cells scroll inside.
  const cellMax=calHeight?Math.max(54,Math.floor(calHeight/weeks)-2):(weeks>1?118:188);
  // Standalone calendar events, sorted so a multi-day event keeps a stable row across days.
  const sortedCalEvents=[...calendarEvents].sort((a,b)=>a.startDate<b.startDate?-1:a.startDate>b.startDate?1:(a.id<b.id?-1:1));
  const openTaskPicker=(e,t)=>{e.stopPropagation();setPickerPos(placePopover(e.currentTarget.getBoundingClientRect()));setPickerTask(t);};

  const allTasks=projects.flatMap(p=>
    p.tasks.filter(t=>!t.done&&t.dueDate)
      .map(t=>({...t,kind:'task',projectColor:p.color,projectId:p.id}))
  );
  const allReminders=projects.flatMap(p=>
    (p.reminders||[]).filter(r=>!r.done&&r.dueDate)
      .map(r=>({...r,kind:'reminder',projectColor:p.color,projectId:p.id}))
  );
  const allEvents=projects.flatMap(p=>
    (p.events||[]).filter(e=>!e.done&&e.dueDate)
      .map(e=>({...e,kind:'event',projectColor:p.color,projectId:p.id}))
  );
  // Project events with a last day render as spanning bars (like standalone
  // calendar events) instead of single-day chips. Stable sort keeps a span on
  // the same row across its days.
  const isSpan=e=>e.endDate&&e.endDate>e.dueDate;
  const spanEvents=allEvents.filter(isSpan).sort((a,b)=>a.dueDate<b.dueDate?-1:a.dueDate>b.dueDate?1:(a.id<b.id?-1:1));

  const itemsForDay=iso=>{
    const tasks=allTasks.filter(t=>t.dueDate===iso);
    const reminders=allReminders.filter(r=>r.dueDate===iso);
    const events=allEvents.filter(e=>e.dueDate===iso&&!isSpan(e));
    const eventsNoTime=events.filter(e=>!e.taskTime);
    const timed=[...tasks.filter(t=>t.taskTime),...reminders.filter(r=>r.taskTime),...events.filter(e=>e.taskTime)]
      .sort((a,b)=>timeSortVal(a.taskTime)-timeSortVal(b.taskTime));
    const untimedTasks=[...tasks.filter(t=>!t.taskTime),...reminders.filter(r=>!r.taskTime)];
    return{eventsNoTime,untimedTasks,timed};
  };

  // Drag-to-reschedule between days. Payload held in a ref; HTML5 DnD across cells.
  const dragItem=useRef(null);
  const[dragOverIso,setDragOverIso]=useState(null);
  const startItemDrag=(ev,it)=>{dragItem.current={t:'item',id:it.id,kind:it.kind,taskTime:it.taskTime||null,endTime:it.endTime||null};try{ev.dataTransfer.effectAllowed='move';ev.dataTransfer.setData('text/plain',it.id);}catch(_){}};
  const startCalDrag=(ev,ce)=>{dragItem.current={t:'cal',id:ce.id};try{ev.dataTransfer.effectAllowed='move';ev.dataTransfer.setData('text/plain',ce.id);}catch(_){}};
  const onDayOver=(ev,iso)=>{if(dragItem.current){ev.preventDefault();ev.dataTransfer.dropEffect='move';if(dragOverIso!==iso)setDragOverIso(iso);}};
  const onDayDrop=(ev,iso)=>{
    ev.preventDefault();const d=dragItem.current;dragItem.current=null;setDragOverIso(null);if(!d)return;
    if(d.t==='item'){onAssignDay&&onAssignDay(d.id,iso,d.taskTime,d.endTime,d.kind);}
    else if(d.t==='cal'&&onSaveCalendarEvent){const ce=calendarEvents.find(e=>e.id===d.id);if(ce){const span=new Date(ce.endDate||ce.startDate).getTime()-new Date(ce.startDate).getTime();const ne=new Date(new Date(iso).getTime()+span).toISOString().slice(0,10);onSaveCalendarEvent({...ce,startDate:iso,endDate:ne});}}
  };
  const renderDayCell=(i,d)=>{
    const iso=toISO(d);
    const isToday=iso===todayISO();
    const{eventsNoTime,untimedTasks,timed}=itemsForDay(iso);
    const dayEvents=sortedCalEvents.filter(ev=>ev.startDate<=iso&&iso<=(ev.endDate||ev.startDate));
    const daySpans=spanEvents.filter(e=>e.dueDate<=iso&&iso<=e.endDate);
    const hasAny=dayEvents.length>0||daySpans.length>0||eventsNoTime.length>0||untimedTasks.length>0||timed.length>0;
    const col=i%7;
    return html`
      <div key=${i} onDragOver=${ev=>onDayOver(ev,iso)} onDrop=${ev=>onDayDrop(ev,iso)} onDragLeave=${()=>{if(dragOverIso===iso)setDragOverIso(null);}}
        style=${{borderRight:col<6?'1px solid #F0EBE5':'none',padding:'5px 5px',background:dragOverIso===iso?'#EAF1FB':isToday?'#FAFAF8':'white',overflowY:'auto',minHeight:54,maxHeight:cellMax,transition:'background 0.1s'}}>
        <div style=${{marginBottom:5,textAlign:'center'}}>
          <div style=${{fontSize:12,fontWeight:600,lineHeight:1,background:isToday?'#2A2825':'none',color:isToday?'white':'#9A9088',
            borderRadius:'50%',width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto'}}>${d.getDate()}</div>
        </div>
        ${dayEvents.map(ev=>html`<${CalEventChip} key=${ev.id} ev=${ev} isStart=${ev.startDate===iso} onEdit=${setEventForm} onDelete=${onDeleteCalendarEvent} onDragStart=${e=>startCalDrag(e,ev)}/>`)}
        ${daySpans.map(e=>html`
          <div key=${e.id} draggable=${true} onDragStart=${ev=>startItemDrag(ev,e)} onClick=${ev=>openTaskPicker(ev,e)} title="Edit event"
            style=${{background:tint(e.projectColor),borderRadius:4,padding:'2px 5px',marginBottom:3,minHeight:15,display:'flex',alignItems:'center',cursor:'grab',
              borderLeft:e.dueDate===iso?`3px solid ${e.projectColor}`:'none'}}>
            <span style=${{fontSize:9.5,color:'#2A2825',lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>
              ${e.dueDate===iso?html`${e.important?html`<span style=${{color:PRIORITY_COLOR}}>★ </span>`:''}${e.text}`:' '}
            </span>
          </div>`)}
        ${eventsNoTime.map(e=>html`
          <div key=${e.id} draggable=${true} onDragStart=${ev=>startItemDrag(ev,e)} style=${{background:tint(e.projectColor),borderRadius:4,padding:'3px 5px',marginBottom:3,borderLeft:`3px solid ${e.projectColor}`,cursor:'grab'}} onClick=${ev=>openTaskPicker(ev,e)}>

  const dot=c=>`<div class="dot" style="background:${esc(c)}"></div>`;
  const masterSection=`<div class="project" style="page-break-after:always"><div class="ph" style="background:#F0EBE5">Master List</div>${priTasks.length?`<div class="sec" style="color:#D4758A;border-top:none">★ Priority</div>${priTasks.map(t=>`<div class="task"><div class="cb"></div>${dot(t.projectColor)}<span>${esc(t.text)}</span><span style="margin-left:auto;font-size:8pt;color:#9A9088">${esc(t.projectName)}</span></div>`).join('')}` : ''}${flaggedReminders.length?`<div class="sec" style="color:#5B8FBF">⚑ Reminders</div>${flaggedReminders.map(r=>`<div class="task"><div class="cb"></div>${dot(r.projectColor)}<span>${esc(r.text)}</span><span style="margin-left:auto;font-size:8pt;color:#9A9088">${esc(r.projectName)}</span></div>`).join('')}`:''}${normalGroups.map(p=>`<div class="sec">${esc(p.name)}</div>${p.masterTasks.map(t=>`<div class="task"><div class="cb"></div><span>${esc(t.text)}</span></div>`).join('')}`).join('')}${completedItems.length?`<div class="sec">Completed</div>${completedItems.map(i=>`<div class="task"><div class="cb done"></div>${dot(i.projectColor)}<span class="done-text">${esc(i.text)}</span><span style="margin-left:auto;font-size:8pt;color:#9A9088">${esc(i.projectName)}</span></div>`).join('')}`:''}</div>`;
  const projSections=projects.map(p=>`<div class="project"><div class="ph" style="background:${esc(p.color)};color:${isLight(p.color)?'#2A2825':'#fff'}">${esc(p.name)}</div>${p.tasks.length?`<div class="sec">Tasks</div>${p.tasks.map(t=>`<div class="task"><div class="cb${t.done?' done':''}"></div><span class="${t.done?'done-text':''}">${esc(t.text)}</span></div>`).join('')}`:''}${(p.reminders||[]).length?`<div class="sec">Reminders</div>${(p.reminders||[]).map(r=>`<div class="task"><div class="cb${r.done?' done':''}"></div><span class="${r.done?'done-text':''}">${esc(r.text)}</span>${r.flagged?` <span style="color:#5B8FBF">⚑</span>`:''}</div>`).join('')}`:''}${p.notes.length?`<div class="sec">Notes</div><div class="notes">${p.notes.map(n=>`<div class="note" style="background:${esc(n.color)}">${n.title?`<div style="font-family:'DM Serif Display',serif;font-size:13pt;margin-bottom:4pt">${esc(n.title)}</div>`:''}<div>${esc(n.text||'').replace(/\n/g,'<br/>')}</div>${(n.checklistItems||[]).map(it=>`<div style="margin-top:3pt;${it.done?'text-decoration:line-through;color:#9A9088':''}">• ${esc(it.text)}</div>`).join('')}</div>`).join('')}</div>`:''}  </div>`).join('');
  return`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Planner</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/><style>${css}</style></head><body><div class="hdr"><div><h1>Planner</h1><div class="date">${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div></div><button class="exit-btn" onclick="window.close()">← Exit print view</button></div><button class="print-btn" onclick="window.print()">Print / Save as PDF</button>${masterSection}${projSections}</body></html>`;
};

/* ── Copy for Copilot ──────────────────────────────────────────
   Open TASKS only (no reminders/events — user preference) from the given
   plans (projectIds; null = all), as Markdown for pasting into a
   Microsoft Copilot chat. Each task appears exactly once so Copilot
   can't double-import it. */
const buildCopilotText=(state,projectIds=null)=>{
  const tdy=todayISO();
  const due=d=>!d?'':d===tdy?` (due today, ${isoToLong(d)})`:d<tdy?` (OVERDUE — was due ${isoToLong(d)})`:` (due ${isoToLong(d)})`;
  const pri=new Set(state.priorityIds||[]);
  const wanted=projectIds&&projectIds.length?new Set(projectIds):null;
  const lines=[`Here are my open tasks as of ${isoToLong(tdy)}, grouped by project. ★ = priority, OVERDUE = past its due date.`];
  (state.projects||[]).forEach(p=>{
    if(wanted&&!wanted.has(p.id))return;
    const t=(p.tasks||[]).filter(it=>!it.done).sort((a,b)=>pri.has(b.id)-pri.has(a.id));
    if(!t.length)return;
    lines.push('','## '+p.name);
    t.forEach(x=>lines.push(`- ${pri.has(x.id)?'★ ':''}${x.text}${due(x.dueDate)}`));
  });
  if(lines.length===1)lines.push('','(No open tasks.)');
  return lines.join('\n');
};

          ${important&&html`<div style=${{fontSize:9,fontWeight:700,color:'#9A7A00',marginBottom:5,paddingLeft:2}}>★ new note will be yellow</div>`}
          ${projNotes.length>0&&html`<div style=${{fontSize:9.5,letterSpacing:'0.5px',textTransform:'uppercase',color:'#B0A898',fontWeight:600,padding:'3px 2px 5px'}}>or append to</div>`}
          ${projNotes.map(n=>html`<button key=${n.id} onClick=${()=>addToNote(n.id)} style=${menuItem}>
            <span style=${{display:'inline-block',width:9,height:9,borderRadius:2,background:n.color,border:'1px solid rgba(0,0,0,0.12)',marginRight:7,flexShrink:0}}/>
            <span style=${{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${noteLabel(n)}</span>
          </button>`)}
          <button onClick=${()=>setNoteMenuOpen(false)} style=${{background:'none',border:'none',color:'#9A9088',fontSize:11,cursor:'pointer',padding:'3px 2px 0',textDecoration:'underline'}}>Cancel</button>
        </div>`}
    </div>`;
};

/* ── Audio chunking for long recordings ───────────────────────
   Whisper runs server-side behind /api/transcribe, whose request body
   caps near 6 MB. Long files are decoded to 16 kHz mono in the browser,
   split into ~2-min WAV chunks (~5 MB base64 each), and transcribed in
   PARALLEL, then joined — restoring the original Brainy's long-file flow. */
const TX_SAMPLE_RATE=16000;
const TX_CHUNK_SECONDS=120;        // ~5 MB base64 per chunk, safely under the 6 MB limit
const TX_DIRECT_MAX=3.5*1024*1024; // files this small skip decoding and go straight through

function encodeWav(samples,sampleRate){
  const buffer=new ArrayBuffer(44+samples.length*2),view=new DataView(buffer);
  const w=(o,s)=>{for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i));};
  w(0,'RIFF');view.setUint32(4,36+samples.length*2,true);w(8,'WAVE');w(12,'fmt ');
  view.setUint32(16,16,true);view.setUint16(20,1,true);view.setUint16(22,1,true);
  view.setUint32(24,sampleRate,true);view.setUint32(28,sampleRate*2,true);view.setUint16(32,2,true);view.setUint16(34,16,true);
  w(36,'data');view.setUint32(40,samples.length*2,true);
  for(let i=0;i<samples.length;i++)view.setInt16(44+i*2,Math.max(-1,Math.min(1,samples[i]))*0x7fff,true);
  return new Blob([buffer],{type:'audio/wav'});
}
async function decodeToMono(blob){
  const arrayBuffer=await blob.arrayBuffer();
  const Ctx=window.AudioContext||window.webkitAudioContext;
  const ctx=new Ctx({sampleRate:TX_SAMPLE_RATE});
  const decoded=await ctx.decodeAudioData(arrayBuffer);
  ctx.close();
  const ch0=decoded.getChannelData(0);
  if(decoded.numberOfChannels===1)return ch0;
  const ch1=decoded.getChannelData(1);
  const mono=new Float32Array(ch0.length);
  for(let i=0;i<ch0.length;i++)mono[i]=(ch0[i]+ch1[i])/2;
  return mono;
}
const blobToB64=blob=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=rej;r.readAsDataURL(blob);});
async function transcribeBlob(blob,name){
  const audio=await blobToB64(blob);
  const res=await fetch('/api/transcribe',{method:'POST',headers:{'Content-Type':'application/json',...(await authHeader())},body:JSON.stringify({audio,mime:blob.type,name})});
  if(!res.ok){let msg='Transcription failed ('+res.status+').';try{const d=await res.json();if(d&&d.error)msg=d.error;}catch(_){}throw new Error(msg);}
  return (await res.json()).text||'';
}

const BrainySidebar = ({insights,projects,onAdd,onAddToNote,onDismiss,onCapture,onReorder,collapsed,onToggleCollapse,width=312}) => {
  const[capture,setCapture]=useState('');
  const[sel,setSel]=useState({}); // insightId -> projectId
  const[imp,setImp]=useState({}); // insightId -> bool (mark important on add)
  const[edits,setEdits]=useState({}); // insightId -> edited text
  const[dates,setDates]=useState({}); // insightId -> 'YYYY-MM-DD' to schedule on add
  const[listening,setListening]=useState(false);
  const[busy,setBusy]=useState(null); // null | status string
  const[note,setNote]=useState(null); // transient info/error message
  const recRef=useRef(null);
  const fileRef=useRef(null);
  const fileRef2=useRef(null); // separate upload input for the full-screen overlay
  const[fullscreen,setFullscreen]=useState(false);
  const[dragIdx,setDragIdx]=useState(null);
  const[overIdx,setOverIdx]=useState(null);
  const SR=typeof window!=='undefined'?(window.SpeechRecognition||window.webkitSpeechRecognition):null;
  // Best-guess project: infer from the insight text by matching its words against
  // each project's name (weighted) and its existing items/notes.
  const guessProject=ins=>{
    const words=new Set(tokenize(ins.text).filter(w=>w.length>=3&&!STOPWORDS.has(w)));
    if(!words.size)return null;
    let bestId=null,bestScore=0;
    for(const p of projects){
      let score=0;
      for(const w of tokenize(p.name))if(w.length>=3&&!STOPWORDS.has(w)&&words.has(w))score+=3;
      const blob=[...(p.tasks||[]),...(p.reminders||[]),...(p.events||[])].map(it=>it.text).join(' ')+' '+(p.notes||[]).map(n=>(n.title||'')+' '+(n.text||'')).join(' ');
      const toks=new Set(tokenize(blob));
      for(const w of words)if(toks.has(w))score+=1;
      if(score>bestScore){bestScore=score;bestId=p.id;}
    }
    return bestScore>0?bestId:null;
  };
  const projForInsight=ins=>{
    if(sel[ins.id])return sel[ins.id];
    const m=projects.find(p=>p.name===ins.suggestProject); // explicit suggestion (sample data)
    if(m)return m.id;
    return guessProject(ins)||(projects[0]&&projects[0].id);
  };
  const selectProject=(id,pid)=>setSel(s=>({...s,[id]:pid}));
  const toggleImportant=id=>setImp(s=>({...s,[id]:!s[id]}));
  const editText=(id,val)=>setEdits(s=>({...s,[id]:val}));
  const textFor=ins=>edits[ins.id]!==undefined?edits[ins.id]:ins.text;
  // Heuristic stand-ins (Phase 2: Claude returns a real summary + clean items).
  const ABBR=/\b(Dr|Mr|Mrs|Ms|St|vs|etc|Inc|Co|Jr|Sr|Ave|Mt|approx|No)\.$/i;
  const splitItems=raw=>raw.split(/\n+/).flatMap(line=>{
    const t=line.trim(); if(!t)return [];
    const parts=t.split(/(?<=[.!?;])\s+/);
    const out=[]; let buf='';
    parts.forEach(p=>{
      buf=buf?buf+' '+p:p;
      if(ABBR.test(buf.trim()))return; // false split on an abbreviation — keep building
      out.push(buf.trim()); buf='';
    });
    if(buf.trim())out.push(buf.trim());
    return out;
  }).map(s=>s.replace(/^[\s\-*•\d.\)]+/,'').replace(/[.;]\s*$/,'').trim()).filter(s=>s.length>2);
  const summarize=txt=>{
    const words=txt.replace(/\s+/g,' ').trim().split(' ').filter(Boolean);
    if(!words.length)return '';
    return words.length>16?words.slice(0,16).join(' ')+'…':words.join(' ');
  };
  // Trim a to-do down to a terser note: drop leading filler ("I need to…"), cap length.
  const condense=s=>{
    let t=s.replace(/^(please\s+|just\s+|make sure (?:to|i)\s+|don'?t forget to\s+|remember to\s+|need to\s+|i\s+(?:need to|have to|should|will|'?ll|am going to|plan to|want to|gotta)\s+|we\s+(?:need to|should|will)\s+|going to\s+)/i,'').replace(/\s+/g,' ').trim();
    t=t.replace(/^[a-z]/,c=>c.toUpperCase());
    return t;
  };
  // Local heuristic fallback — used when the serverless Brain function isn't reachable.
  const localExtract=raw=>{
    const items=splitItems(raw); if(!items.length)return [];
    const out=[];
    const s=summarize(raw);
    if(s)out.push({id:uid(),type:'summary',text:s,source:'Summary · on-device',suggestKind:'note'});
    items.forEach(l=>out.push({id:uid(),type:'action',text:condense(l),source:'Quick capture · on-device',suggestKind:'task'}));
    return out;
  };
  // Map the /api/brainy response into insight cards.
  const resultToInsights=r=>{
    const out=[];
    if(r.summary)out.push({id:uid(),type:'summary',text:r.summary,source:'Brain summary',suggestKind:'note'});
    (r.actionItems||[]).forEach(t=>out.push({id:uid(),type:'action',text:t,source:'Mine to do · Brain',suggestKind:'task'}));
    (r.followUps||[]).forEach(t=>out.push({id:uid(),type:'followup',text:t,source:'Waiting on · Brain',suggestKind:'reminder'}));
    return out;
  };
  const extract=async()=>{
    const raw=capture.trim(); if(!raw||busy)return;
    setNote(null);setBusy('Analyzing…');
    try{
      const res=await fetch('/api/brainy',{method:'POST',headers:{'Content-Type':'application/json',...(await authHeader())},body:JSON.stringify({text:raw})});
      if(res.status===401)setNote('Brain AI needs a signed-in session — used the on-device extraction instead. Refresh the page and retry.');
      if(!res.ok)throw new Error('backend '+res.status);
      const data=await res.json();
      onCapture(resultToInsights(data));
    }catch(e){
      // No backend (e.g. opened locally) → use the on-device heuristic.
      const local=localExtract(raw);
      if(!local.length){setBusy(null);return;}
      onCapture(local);
    }
    setBusy(null);setCapture('');
  };
  // Transcribe a single file to text (chunking long recordings).
  const transcribeFile=async(file)=>{
    if(file.size<=TX_DIRECT_MAX)return await transcribeBlob(file,file.name);
    const mono=await decodeToMono(file);
    const chunkSamples=TX_CHUNK_SECONDS*TX_SAMPLE_RATE;
    const total=Math.max(1,Math.ceil(mono.length/chunkSamples));
    const chunks=Array.from({length:total},(_,i)=>encodeWav(mono.slice(i*chunkSamples,(i+1)*chunkSamples),TX_SAMPLE_RATE));
    const parts=await Promise.all(chunks.map((wav,i)=>transcribeBlob(wav,`chunk${i}.wav`)));
    const text=parts.filter(Boolean).join(' ').trim();
    if(!text)throw new Error('No speech detected in the recording.');
    return text;
  };
  // Batch: transcribe one or many files in sequence, appending each transcript
  // so a day's worth of short voice memos can be extracted together.
  const onAudioFiles=async(files)=>{
    const list=[...files].filter(Boolean);
    if(!list.length||busy)return;
    setNote(null);
    const n=list.length;
    try{
      const all=[];
      for(let i=0;i<n;i++){
        setBusy(n>1?`Transcribing ${i+1} of ${n}…`:'Transcribing…');
        const text=await transcribeFile(list[i]);
        if(text&&text.trim())all.push(text.trim());
      }
      const joined=all.join('\n\n');
      if(joined)setCapture(prev=>(prev?prev.trim()+'\n\n':'')+joined);
    }catch(e){
      const m=e&&e.message?e.message:'';
      setNote(m&&!/fetch/i.test(m)?m:'Could not reach the transcription function (expected when running locally — try Live listen).');
    }
    setBusy(null);
  };
  // Live listen — browser speech-to-text (Chrome/Edge), no API key needed.
  const toggleListen=()=>{
    if(!SR)return;
    if(listening){try{recRef.current&&recRef.current.stop();}catch(e){}return;}
    const rec=new SR();
    rec.continuous=true;rec.interimResults=false;rec.lang='en-US';
    rec.onresult=e=>{
      let finalT='';
      for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)finalT+=e.results[i][0].transcript;}
      if(finalT.trim())setCapture(prev=>(prev?prev.trim()+' ':'')+finalT.trim());
    };
    rec.onerror=()=>setListening(false);
    rec.onend=()=>{setListening(false);recRef.current=null;};
    recRef.current=rec;
    try{rec.start();setListening(true);}catch(e){setListening(false);}
  };
  useEffect(()=>()=>{try{recRef.current&&recRef.current.stop();}catch(e){}},[]);

  const moveInsight=(from,to)=>{
    if(from==null||to==null||from===to||!onReorder)return;
    const arr=[...insights];const[m]=arr.splice(from,1);arr.splice(to,0,m);onReorder(arr);
  };
  // Quick-capture card (shared by the sidebar and the full-screen gallery; each gets its own file input).
  const renderCapture=(fref)=>html`
    <div style=${{background:'white',border:'1px solid #ECE6DE',borderRadius:12,padding:'11px 12px',marginBottom:14}}>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6,gap:6}}>
        <span style=${{fontSize:11,fontWeight:600,color:'#7A7068',flexShrink:0}}>Quick capture</span>
        <div style=${{display:'flex',alignItems:'center',gap:6}}>
          <button onClick=${toggleListen} disabled=${!SR}
            title=${SR?'Live transcribe from your microphone':'Live listen needs Chrome or Edge'}
            style=${{display:'flex',alignItems:'center',gap:5,border:`1px solid ${listening?'#C7493A':'#E0D8D0'}`,
              background:listening?'#FCEEEC':'white',color:listening?'#C7493A':(SR?'#7A7068':'#C8C0B8'),
              borderRadius:14,padding:'3px 9px',fontSize:10.5,fontWeight:500,cursor:SR?'pointer':'not-allowed'}}>
            <span class=${listening?'brain-rec-dot':''} style=${{width:7,height:7,borderRadius:'50%',background:listening?'#C7493A':'#9A9088',display:'inline-block',flexShrink:0}}/>
            ${listening?'Listening… stop':'Live listen'}
          </button>
          <button onClick=${()=>fref.current&&fref.current.click()} title="Upload audio file(s) to transcribe — pick several to batch them (needs deployed backend)"
            style=${{border:'1px solid #E0D8D0',background:'white',color:'#7A7068',borderRadius:14,padding:'3px 9px',fontSize:10.5,fontWeight:500,cursor:'pointer'}}>Upload</button>
          <!-- Explicit extensions alongside audio/* so iOS Files doesn't gray out
               .m4a (Voice Memos) — audio/* alone is unreliable on iOS. multiple = batch several memos at once. -->
          <input ref=${fref} type="file" multiple accept="audio/*,.m4a,.mp3,.wav,.aac,.m4b,.caf,.aiff,.mp4,.mpeg,.mpga,.webm,.ogg,.oga,.flac" style=${{display:'none'}}
            onChange=${e=>{const fs=e.target.files;if(fs&&fs.length)onAudioFiles(fs);e.target.value='';}}/>
        </div>
      </div>
      <textarea value=${capture} onInput=${e=>setCapture(e.target.value)}
        placeholder="Paste a Teams recap, jot notes, or use Live listen — one idea per line…"
        style=${{width:'100%',minHeight:64,resize:'vertical',border:'1px solid #E0D8D0',borderRadius:8,padding:'7px 9px',fontSize:12,color:'#2A2825',background:'#FAFAF8',outline:'none',lineHeight:1.4}}/>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:8,gap:8}}>
        <span style=${{fontSize:9.5,color:'#B8B0A6',fontStyle:'italic'}}>${busy?busy:'Summary + to-dos · Brain AI when deployed'}</span>
        <button onClick=${extract} disabled=${!capture.trim()||!!busy}
          style=${{background:(capture.trim()&&!busy)?'#2A2825':'#D8D0C8',color:'#F4F1ED',border:'none',borderRadius:8,padding:'6px 12px',fontSize:11.5,fontWeight:500,cursor:(capture.trim()&&!busy)?'pointer':'default',whiteSpace:'nowrap'}}>${busy==='Analyzing…'?'Analyzing…':'Summarize + extract'}</button>
      </div>
      ${note&&html`<div style=${{marginTop:8,fontSize:10.5,color:'#9A7A6A',background:'#FBF3EE',border:'1px solid #EADBD0',borderRadius:7,padding:'6px 8px',lineHeight:1.4}}>${note}</div>`}
    </div>`;
  const renderCard=(ins)=>html`<${InsightCard} key=${ins.id} insight=${ins} projects=${projects}
    selectedProjectId=${projForInsight(ins)} onSelectProject=${selectProject}
    important=${!!imp[ins.id]} onToggleImportant=${toggleImportant}
    text=${textFor(ins)} onEditText=${editText}
    scheduledDate=${dates[ins.id]||null} onSetDate=${(id,v)=>setDates(s=>({...s,[id]:v}))}
    onAdd=${onAdd} onAddToNote=${onAddToNote} onDismiss=${onDismiss}/>`;
  const gripHandle=(i)=>html`<div draggable=${true}
    onDragStart=${e=>{setDragIdx(i);try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',String(i));}catch(_){}}}
    onDragEnd=${()=>{setDragIdx(null);setOverIdx(null);}} title="Drag to reorder"
    style=${{display:'flex',alignItems:'center',justifyContent:'center',height:16,cursor:'grab',opacity:0.32,marginBottom:2,userSelect:'none'}}>
    <svg width="30" height="5" viewBox="0 0 30 5" fill="none"><circle cx="4" cy="2.5" r="1.5" fill="#2A2825"/><circle cx="11" cy="2.5" r="1.5" fill="#2A2825"/><circle cx="19" cy="2.5" r="1.5" fill="#2A2825"/><circle cx="26" cy="2.5" r="1.5" fill="#2A2825"/></svg>
  </div>`;

  if(collapsed)return html`
    <div style=${{width:30,flexShrink:0,borderLeft:'1px solid #EAE4DC',background:'#FAFAF8',position:'relative'}}>
      <button onClick=${onToggleCollapse} style=${{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%) rotate(90deg)',background:'none',border:'none',color:'#9A9088',fontSize:11,cursor:'pointer',whiteSpace:'nowrap',letterSpacing:'0.5px'}}>BRAIN ▸</button>
    </div>`;

  return html`
    <${Fragment}>
    <div style=${{width,flexShrink:0,borderLeft:'1px solid #EAE4DC',background:'#F7F5F1',display:'flex',flexDirection:'column'}}>
      <div style=${{padding:'13px 14px 11px',borderBottom:'1px solid #EAE4DC',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div style=${{display:'flex',alignItems:'center',gap:7}}>
          <div>
            <div style=${{fontFamily:"'DM Serif Display',serif",fontSize:15}}>Brain</div>
            <div style=${{fontSize:10,color:'#A8A096',marginTop:1}}>${insights.length} suggestion${insights.length===1?'':'s'} for your planner</div>
          </div>
        </div>
        <div style=${{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          <button onClick=${()=>setFullscreen(true)} title="Open full screen" style=${{background:'none',border:'none',color:'#9A9088',fontSize:14,cursor:'pointer',lineHeight:1,padding:0}}>⤢</button>
          <button onClick=${onToggleCollapse} title="Collapse" style=${{background:'none',border:'none',color:'#C0B8B0',fontSize:13,cursor:'pointer'}}>▷</button>
        </div>
      </div>

      <div style=${{flex:1,overflowY:'auto',padding:'12px 13px 20px'}}>
        ${renderCapture(fileRef)}
        <div style=${{fontSize:10,letterSpacing:'0.8px',textTransform:'uppercase',color:'#B0A898',fontWeight:600,marginBottom:9,paddingLeft:2}}>Suggested for you</div>
        ${insights.length===0
          ?html`<div style=${{textAlign:'center',padding:'24px 12px',color:'#B8B0A6',fontSize:12,lineHeight:1.7}}>All caught up.<br/>Capture notes above and Brainy will surface to-dos here.</div>`
          :insights.map(renderCard)}
      </div>
    </div>
    ${fullscreen&&html`
      <div style=${{position:'fixed',inset:0,zIndex:4000,background:'#F4F1ED',display:'flex',flexDirection:'column'}}>
        <div style=${{padding:'14px 22px',borderBottom:'1px solid #EAE4DC',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div style=${{display:'flex',alignItems:'baseline',gap:10}}>
            <div style=${{fontFamily:"'DM Serif Display',serif",fontSize:20}}>Brain</div>
            <div style=${{fontSize:11,color:'#A8A096'}}>${insights.length} suggestion${insights.length===1?'':'s'} · drag the handle above a card to reorder</div>
          </div>

        </div>
        <div style=${{flex:1,overflowY:'auto',padding:'18px 22px 48px'}}>
          <div style=${{maxWidth:560,margin:'0 auto 20px'}}>${renderCapture(fileRef2)}</div>
          ${insights.length===0
            ?html`<div style=${{textAlign:'center',padding:'48px 20px',color:'#B8B0A6',fontSize:13}}>All caught up. Capture notes above to surface to-dos.</div>`
            :html`<div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:14,alignItems:'start'}}>
              ${insights.map((ins,i)=>html`<div key=${ins.id}
                onDragOver=${e=>{e.preventDefault();if(overIdx!==i)setOverIdx(i);}}
                onDrop=${e=>{e.preventDefault();moveInsight(dragIdx,i);setDragIdx(null);setOverIdx(null);}}
                style=${{borderRadius:14,outline:(overIdx===i&&dragIdx!=null&&dragIdx!==i)?'2px dashed #C8B8A2':'none',outlineOffset:3,opacity:dragIdx===i?0.4:1,transition:'opacity 0.12s'}}>
                ${gripHandle(i)}
                ${renderCard(ins)}
              </div>`)}
            </div>`}
        </div>
      </div>`}
    <//>`;
};

/* ── Auth Gate ─────────────────────────────────────────────────
   Passkey-first sign-in, with the email magic link as bootstrap + fallback.
   Rendered only when sync is configured and there's no session yet.
   - Passkey: signInWithPasskey runs the WebAuthn ceremony (no email needed);
     works once a passkey exists on this device / synced via the OS keychain.
   - Email link: needed the first time (to create the account so a passkey
     can be added from inside the app) and whenever a passkey isn't available. */
const AuthGate = () => {
  const[view,setView]=useState('home'); // 'home' | 'email' | 'sent'
  const[email,setEmail]=useState('');
  const[busy,setBusy]=useState('');     // '' | 'passkey' | 'email'
  const[err,setErr]=useState('');
  const INPUT={width:'100%',border:'1.5px solid #E0D8D0',borderRadius:9,padding:'11px 13px',fontSize:14,outline:'none',color:'#2A2825',background:'#FCFBF9',marginBottom:12,display:'block'};

/* Registers a passkey on the current device for the signed-in user. Shown in
   the header so the user can opt in per device / ecosystem. */
const PASSKEY_FLAG='passkey-added';
const passkeyOnThisDevice=()=>{try{return !!localStorage.getItem(PASSKEY_FLAG);}catch(e){return false;}};
const markPasskeyAdded=()=>{try{localStorage.setItem(PASSKEY_FLAG,'1');}catch(e){}};
// Register a passkey, treating "already on this authenticator" (InvalidStateError) as success.
const tryRegisterPasskey=async()=>{
  try{const{error}=await registerPasskey();if(error)throw error;markPasskeyAdded();return 'ok';}
  catch(ex){
    const m=(((ex&&ex.name)||'')+' '+((ex&&ex.message)||'')).toLowerCase();
    if(m.includes('invalidstate')||m.includes('already')||m.includes('exclude')){markPasskeyAdded();return 'ok';}
    return 'err';
  }
};
const AddPasskeyButton = () => {
  const persisted=passkeyOnThisDevice(); // set up in a PRIOR session?
  const[st,setSt]=useState(''); // '' | 'busy' | 'done' | 'err' — transient, THIS session only
  const add=async()=>{setSt('busy');setSt((await tryRegisterPasskey())==='ok'?'done':'err');};
  // Already set up before this session → keep the header clean; status lives in the ⋯ menu.
  if(persisted&&st==='')return null;
  if(st==='done')return html`<span style=${{fontSize:12,color:'#5E9E5E',whiteSpace:'nowrap'}} title="A passkey is set up on this device">✓ Passkey on</span>`;
  return html`<button onClick=${add} disabled=${st==='busy'}
    title="Register a passkey on this device for faster sign-in next time"
    style=${{background:'none',border:'1px solid #E0D8D0',borderRadius:16,padding:'6px 12px',fontSize:12,color:st==='err'?'#A0291E':'#7A7068',cursor:st==='busy'?'default':'pointer',whiteSpace:'nowrap'}}>

};

/* Draggable divider that resizes an adjacent side panel. dir=+1 grows the
   panel when dragged right (left/Master panel), dir=-1 grows it when dragged
   left (right/Brain panel). maxByWindow keeps the center from being squeezed. */
const PanelResizer = ({width,setWidth,dir,min,max,maxByWindow,zoom=1}) => {
  const[hov,setHov]=useState(false);
  const onDown=e=>{
    e.preventDefault();
    const startX=e.clientX,startW=width;
    const clearSel=()=>{try{const s=window.getSelection&&window.getSelection();s&&s.removeAllRanges&&s.removeAllRanges();}catch(_){}};
    const noSel=v=>{document.body.style.userSelect=v;document.body.style.webkitUserSelect=v;}; // webkit prefix for Safari/iPad
    const move=ev=>{
      clearSel();
      const hi=Math.min(max,maxByWindow?maxByWindow():max);
      setWidth(Math.round(Math.max(min,Math.min(hi,startW+dir*(ev.clientX-startX)/zoom))));
    };
    const up=()=>{
      window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);
      document.body.style.cursor='';noSel('');clearSel();
    };
    window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);
    document.body.style.cursor='col-resize';noSel('none');clearSel();
  };
  return html`<div onPointerDown=${onDown} onMouseEnter=${()=>setHov(true)} onMouseLeave=${()=>setHov(false)}
    title="Drag to resize" role="separator"
    style=${{width:7,flexShrink:0,cursor:'col-resize',touchAction:'none',position:'relative',display:'flex',justifyContent:'center',background:'transparent'}}>
    <div style=${{width:hov?3:1,background:hov?'#B8AE9E':'#EAE4DC',transition:'width 0.12s, background 0.12s'}}/>
  </div>`;
};

const App = () => {
  const[state,setState]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[session,setSession]=useState(null);
  const[authReady,setAuthReady]=useState(!syncEnabled); // local-only: nothing to wait for
  const[syncStatus,setSyncStatus]=useState(syncEnabled?'connecting':'off'); // off|connecting|synced
  const[masterCollapsed,setMasterCollapsed]=useState(false);
  const[expandedIds,setExpandedIds]=useState(new Set());
  const[addingProject,setAddingProject]=useState(false);
  const[newProjectName,setNewProjectName]=useState('');
  const[openColorPickerId,setOpenColorPickerId]=useState(null);
  const[copilotPicker,setCopilotPicker]=useState(false);
  const[calCollapsed,setCalCollapsed]=useState(false);
  const[brainyCollapsed,setBrainyCollapsed]=useState(false);
  const[masterWidth,setMasterWidth]=useState(()=>loadPrefs().masterWidth||260);
  const[brainWidth,setBrainWidth]=useState(()=>loadPrefs().brainWidth||312);
  const[zoom,setZoom]=useState(()=>loadPrefs().zoom||1);
  const[calHeight,setCalHeight]=useState(()=>loadPrefs().calHeight||null); // null = auto
  useEffect(()=>{savePrefs({...loadPrefs(),masterWidth,brainWidth,zoom,calHeight});},[masterWidth,brainWidth,zoom,calHeight]);
  const stepZoom=d=>setZoom(z=>Math.min(1.6,Math.max(0.6,Math.round((z+d)*10)/10)));
  const[insights,setInsights]=useState(SAMPLE_INSIGHTS);
  const fileRef=useRef(null);
  const debouncedSaveRef=useRef(debounce(saveState,1200));
  const debouncedSave=debouncedSaveRef.current;
  const skipSave=useRef(false); // suppress the save-echo when state arrives FROM the server
  const channelRef=useRef(null);
  const bootedRef=useRef(false);

  // Seed the app from a state blob (local cache or server), honoring the
  // persisted collapsed list.
  const bootState=saved=>{
    const s=saved?purgeOldCompleted(normalizeState(saved)):makeSeed();
    setState(s);setExpandedIds(expandedFromState(s));
    setLoaded(true);
  };
  // A change pushed by ANOTHER device. Adopt it without echoing a save back up.
  const adoptRemote=(data,ts)=>{
    const s=purgeOldCompleted(normalizeState(data));
    saveLocal(s,ts||new Date().toISOString());
    skipSave.current=true;
    setState(s);
    setExpandedIds(prev=>{const n=new Set(prev);(s.projects||[]).forEach(p=>{if(!prev.has(p.id))n.add(p.id);});return n;});
  };
  // First sign-in or returning: reconcile local cache vs server (newer wins),
  // migrate local up if the server has nothing yet. Hardened so it ALWAYS ends
  // with setLoaded(true) — the app must never get stuck on "Loading…".
  const bootSynced=async userId=>{
    _syncUserId=userId;
    try{
      // The cache on this device may belong to a DIFFERENT account (or to no
      // account — pre-owner-tag builds). Wipe it on mismatch so it can never
      // render for, or be uploaded to, the account signing in now.
      if(localOwner()!==userId)clearLocal();
      const local=loadLocal(),localTs=loadLocalTs();
      let row=null,reachable=false;
      try{row=await withTimeout(pullRemote(userId),8000);reachable=true;}catch(e){}
      const hasRemote=row&&row.data&&Object.keys(row.data).length;
      let chosen,chosenTs;
      if(hasRemote&&local&&localTs&&row.updated_at&&new Date(localTs).getTime()>new Date(row.updated_at).getTime()){
        chosen=local;chosenTs=localTs;try{await withTimeout(pushRemote(userId,local,localTs),8000);}catch(e){}
      }else if(hasRemote){
        chosen=row.data;chosenTs=row.updated_at;
      }else if(local){
        chosen=local;chosenTs=localTs||new Date().toISOString();try{await withTimeout(pushRemote(userId,local,chosenTs),8000);}catch(e){}
      }else{
        // Nothing local, nothing remote: blank planner. Only push (and only
        // timestamp) the seed when the server actually answered — an offline
        // boot must not mint a fresh ts that could later beat the real row.
        chosen=makeSeed();chosenTs=reachable?new Date().toISOString():null;
        if(reachable){try{await withTimeout(pushRemote(userId,chosen,chosenTs),8000);}catch(e){}}
      }
      const s=purgeOldCompleted(normalizeState(chosen));
      saveLocal(s,chosenTs);
      skipSave.current=true; // we already pushed during boot — don't re-push on first render
      setState(s);
      setExpandedIds(expandedFromState(s));
      setSyncStatus(reachable?'synced':'connecting');
    }catch(e){
      bootState(loadLocal()); // last-ditch: render from local so we never hang
    }finally{
      setLoaded(true);
    }
  };

  // Auth wiring: ONLY mirror session state here. Never await another Supabase
  // call inside onAuthStateChange — it runs while GoTrue holds its lock, so a
  // PostgREST/auth call would deadlock (the stuck-on-Loading bug). Boot happens
  // in the effect below, reacting to `session`, outside the lock.
  useEffect(()=>{
    if(!syncEnabled){bootState(loadLocal());return;}
    let authSub=null,cancelled=false;
    (async()=>{
      const supa=await getSupa();
      const{data:{subscription}}=supa.auth.onAuthStateChange((_e,sess)=>{
        if(!cancelled){setSession(sess);setAuthReady(true);}
      });
      authSub=subscription;
      const{data:{session:sess}}=await supa.auth.getSession();
      if(!cancelled){setSession(sess);setAuthReady(true);}
    })();
    return ()=>{cancelled=true;try{authSub?.unsubscribe();}catch(e){}};
  },[]);

  // Boot + realtime react to the session — runs OUTSIDE the auth callback.
  useEffect(()=>{
    if(!syncEnabled)return;
    if(session&&!bootedRef.current){
      bootedRef.current=true;
      const uid=session.user.id;
      (async()=>{
        await bootSynced(uid);
        try{channelRef.current=await subscribeRemote(uid,adoptRemote);}catch(e){}
      })();
    }else if(!session&&bootedRef.current){ // signed out — tear down, back to the gate
      bootedRef.current=false;_syncUserId=null;
      clearLocal(); // don't leave this account's planner readable on a shared device
      if(channelRef.current){getSupa().then(s=>{try{s.removeChannel(channelRef.current);}catch(e){}channelRef.current=null;});}
      setLoaded(false);setState(null);setSyncStatus('connecting');
    }
  },[session]);

  // Persist on every change — but skip the render that came FROM the server.
  useEffect(()=>{
    if(!loaded||!state)return;
    if(skipSave.current){skipSave.current=false;return;}
    debouncedSave(state,ok=>setSyncStatus(ok?'synced':'connecting'));
  },[state,loaded]);

  const Loading=t=>html`<div style=${{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'#B0A898',fontSize:14}}>${t}</div>`;
  if(syncEnabled&&!authReady)return Loading('Connecting…');
  if(syncEnabled&&!session)return html`<${AuthGate}/>`;
  if(!loaded||!state)return Loading('Loading…');

  const{projects,priorityIds=[],completedExpanded=false,weeksToShow=1,calendarEvents=[]}=state;
  const upState=p=>setState(s=>({...s,...p}));
  // Standalone calendar events (not tied to a project); part of synced state.
  const saveCalendarEvent=ev=>{
    if(ev.id&&calendarEvents.some(e=>e.id===ev.id))upState({calendarEvents:calendarEvents.map(e=>e.id===ev.id?ev:e)});
    else upState({calendarEvents:[...calendarEvents,{...ev,id:uid()}]});
  };
  const deleteCalendarEvent=id=>upState({calendarEvents:calendarEvents.filter(e=>e.id!==id)});
  // Move a sticky note from one project to another (drag-and-drop between projects).
  const moveNote=(note,fromId,toId)=>{
    if(fromId===toId)return;
    setState(s=>({...s,projects:s.projects.map(p=>{
      if(p.id===fromId)return{...p,notes:(p.notes||[]).filter(n=>n.id!==note.id)};
      if(p.id===toId)return{...p,notes:[...(p.notes||[]),note]};
      return p;
    })}));
  };
  const setWeeks=n=>upState({weeksToShow:n});
  const upProjects=p=>upState({projects:p});
  const upProject=u=>upProjects(projects.map(p=>p.id===u.id?u:p));
  const delProject=id=>{
    setState(s=>({...s,projects:s.projects.filter(p=>p.id!==id),collapsedIds:(s.collapsedIds||[]).filter(x=>x!==id)}));
    setExpandedIds(prev=>{const n=new Set(prev);n.delete(id);return n;});
  };
  const addProject=()=>{
    if(!newProjectName.trim())return;
    const color=PROJECT_COLORS[5+(projects.length%6)];
    const np={id:uid(),name:newProjectName.trim(),color,tasks:[],reminders:[],events:[],notes:[]};
    upProjects([...projects,np]);setExpandedIds(prev=>new Set([...prev,np.id]));
    setNewProjectName('');setAddingProject(false);
  };
  // Expand/collapse writes through to state.collapsedIds so it survives
  // refreshes and sign-ins (and syncs across devices with everything else).
  const toggleExp=id=>{
    const wasExpanded=expandedIds.has(id);
    setExpandedIds(prev=>{const n=new Set(prev);wasExpanded?n.delete(id):n.add(id);return n;});
    setState(s=>{
      const rest=(s.collapsedIds||[]).filter(x=>x!==id);
      return{...s,collapsedIds:wasExpanded?[...rest,id]:rest};
    });
  };
  // Reveal a project (e.g. when a Brain item lands in it) in the UI AND in
  // the persisted collapsed list, so it doesn't re-collapse on refresh.
  const expandProject=id=>{
    setExpandedIds(prev=>prev.has(id)?prev:new Set([...prev,id]));
    setState(s=>(s.collapsedIds||[]).includes(id)?{...s,collapsedIds:s.collapsedIds.filter(x=>x!==id)}:s);
  };
  const masterToggleDone=(pid,tid)=>upProjects(projects.map(p=>{if(p.id!==pid)return p;const tasks=p.tasks.map(t=>t.id===tid?{...t,done:!t.done,archived:false,completedAt:!t.done?Date.now():null}:t);return{...p,tasks:[...tasks.filter(t=>!t.done),...tasks.filter(t=>t.done)]};}));
  const masterToggleReminderDone=(pid,rid)=>upProjects(projects.map(p=>{if(p.id!==pid)return p;const reminders=(p.reminders||[]).map(r=>r.id===rid?{...r,done:!r.done,archived:false,completedAt:!r.done?Date.now():null}:r);return{...p,reminders:[...reminders.filter(r=>!r.done),...reminders.filter(r=>r.done)]};}));
  const masterToggleEventDone=(pid,eid)=>upProjects(projects.map(p=>{if(p.id!==pid)return p;const events=(p.events||[]).map(e=>e.id===eid?{...e,done:!e.done,archived:false,completedAt:!e.done?Date.now():null}:e);return{...p,events:[...events.filter(e=>!e.done),...events.filter(e=>e.done)]};}));
  const togglePriority=tid=>{const a=priorityIds.includes(tid);upState({priorityIds:a?priorityIds.filter(x=>x!==tid):[...priorityIds,tid]});};
  const reorderPriority=(fromId,toId)=>{const a=[...priorityIds];const fi=a.indexOf(fromId),ti=a.indexOf(toId);if(fi!==-1&&ti!==-1){[a[fi],a[ti]]=[a[ti],a[fi]];upState({priorityIds:a});}};
  const emptyCompleted=()=>{setState(s=>{const projects=s.projects.map(p=>({...p,tasks:p.tasks.filter(t=>!t.archived),reminders:(p.reminders||[]).filter(r=>!r.archived),events:(p.events||[]).filter(e=>!e.archived)}));const liveIds=new Set(projects.flatMap(p=>p.tasks.map(t=>t.id)));return{...s,projects,priorityIds:s.priorityIds.filter(id=>liveIds.has(id))};});};
  const assignDayToTask=(pid,tid,day,time,end)=>upProjects(projects.map(p=>p.id===pid?{...p,tasks:p.tasks.map(t=>t.id===tid?{...t,dueDate:day,taskTime:time,endTime:end}:t)}:p));
  // Master-list assign: route to tasks OR reminders by which list the id belongs to.
  const assignDayFromMaster=(pid,id,day,time,end)=>upProjects(projects.map(p=>{
    if(p.id!==pid)return p;
    if(p.tasks.some(t=>t.id===id))return{...p,tasks:p.tasks.map(t=>t.id===id?{...t,dueDate:day,taskTime:time,endTime:end}:t)};
    if((p.reminders||[]).some(r=>r.id===id))return{...p,reminders:(p.reminders||[]).map(r=>r.id===id?{...r,dueDate:day,taskTime:time,endTime:end}:r)};
    return p;
  }));

  /* ── Brainy → Planner bridge ──────────────────────────────────
     This is the integration: a suggestion becomes a real planner
     item (tagged fromBrainy) and immediately flows everywhere the
     planner reads from state — master list, project strip, calendar. */
  const addInsightToPlanner=(insight,projectId,kind,important=false,scheduledDate=null)=>{
    const newId=uid();
    const {text:cleanText,due:textDue}=extractDue(insight.text); // honor a trailing @date
    const due=scheduledDate||textDue; // the card's explicit Schedule date wins
    setState(s=>{
      const projects=s.projects.map(p=>{
        if(p.id!==projectId)return p;
        if(kind==='note')return{...p,notes:[...p.notes,{id:newId,title:(insight.noteTitle||'').trim(),text:cleanText,color:important?'#FFF3BF':defaultNoteColor(p.color),gradientStep:null,checklistItems:[],collapsed:false,fromBrainy:true}]};
        const base={id:newId,text:cleanText,done:false,fromBrainy:true};
        if(kind==='reminder')return{...p,reminders:[...(p.reminders||[]),{...base,flagged:important,dueDate:due,taskTime:null,endTime:null}]};
        if(kind==='event')return{...p,events:[...(p.events||[]),{...base,important,dueDate:due,taskTime:null,endTime:null}]};
        return{...p,tasks:[...p.tasks,due?{...base,dueDate:due}:base]};
      });
      // Tasks express "important" via the priority list.
      const priorityIds=(kind==='task'&&important)?[...(s.priorityIds||[]),newId]:s.priorityIds;
      return{...s,projects,priorityIds};
    });
    expandProject(projectId);
    setInsights(prev=>prev.filter(i=>i.id!==insight.id));
  };
  const addInsightToExistingNote=(insight,projectId,noteId)=>{
    setState(s=>({...s,projects:s.projects.map(p=>{
      if(p.id!==projectId)return p;
      return{...p,notes:p.notes.map(n=>{
        if(n.id!==noteId)return n;
        const add=extractDue(insight.text).text;
        const sep=(n.text&&n.text.trim())?'\n':'';
        // Append as a new bullet, and expand the note so the new line is visible + sized.
        return{...n,text:(n.text||'')+sep+'• '+add,collapsed:false};
      })};
    })}));
    expandProject(projectId);
    setInsights(prev=>prev.filter(i=>i.id!==insight.id));
  };
  const dismissInsight=id=>setInsights(prev=>prev.filter(i=>i.id!==id));
  const addCapturedInsights=items=>setInsights(prev=>[...items,...prev]);
  // Global sweep: archive every checked (done, not-yet-archived) item across all projects.
  const pendingAllCount=projects.flatMap(p=>[...p.tasks,...(p.reminders||[]),...(p.events||[])]).filter(it=>it.done&&!it.archived).length;
  const completeAll=()=>{
    const stamp=Date.now();
    const arch=it=>(it.done&&!it.archived)?{...it,archived:true,completedAt:stamp}:it;
    upProjects(projects.map(p=>({...p,tasks:p.tasks.map(arch),reminders:(p.reminders||[]).map(arch),events:(p.events||[]).map(arch)})));
  };

  return html`
    <div style=${{width:'100%',height:'100%',display:'flex',flexDirection:'column',background:'#F4F1ED'}}>
      <header style=${{padding:'12px 22px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid #EAE4DC',background:'#F4F1ED',flexShrink:0,zIndex:30,gap:10}}>
        <div style=${{fontFamily:"'DM Serif Display',serif",fontSize:21,letterSpacing:'-0.3px',flexShrink:0}}>Planner</div>
        <div style=${{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end',alignItems:'center'}}>
          <div style=${{display:'flex',alignItems:'center',border:'1px solid #E0D8D0',borderRadius:16,overflow:'hidden'}} title="Zoom — makes everything fit, or larger to read">
            <button onClick=${()=>stepZoom(-0.1)} title="Zoom out" style=${{background:'none',border:'none',color:'#7A7068',fontSize:15,lineHeight:1,cursor:'pointer',padding:'4px 9px'}}>−</button>
            <span onClick=${()=>setZoom(1)} title="Reset to 100%" style=${{fontSize:11,color:'#7A7068',minWidth:36,textAlign:'center',cursor:'pointer',userSelect:'none'}}>${Math.round(zoom*100)}%</span>
            <button onClick=${()=>stepZoom(0.1)} title="Zoom in" style=${{background:'none',border:'none',color:'#7A7068',fontSize:15,lineHeight:1,cursor:'pointer',padding:'4px 9px'}}>+</button>
          </div>
          <button onClick=${()=>setAddingProject(true)} style=${{background:'#2A2825',color:'#F4F1ED',border:'none',borderRadius:16,padding:'6px 14px',fontSize:12,fontWeight:500,cursor:'pointer'}}>+ Project</button>
          ${pendingAllCount>0&&html`<button onClick=${completeAll}
            title="Archive all completed items across every project to Master Completed"
            style=${{display:'flex',alignItems:'center',gap:5,background:'none',color:'#5E7A5E',border:'1px solid #BBD0BB',borderRadius:16,padding:'6px 12px',fontSize:12,fontWeight:500,cursor:'pointer'}}>
            <svg width="11" height="9" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6L8 1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Complete all (${pendingAllCount})
          </button>`}
          <${OverflowMenu} items=${[
            {label:'⧉ Copy for Copilot…',onClick:()=>setCopilotPicker(true)},
            {label:'Print',onClick:()=>{const h=buildPrintHTML(projects,priorityIds,completedExpanded);const w=window.open('','_blank');w.document.write(h);w.document.close();}},
            {label:'Export',onClick:()=>exportBackup(state)},
            {label:'Import',onClick:()=>fileRef.current?.click()},
            ...(syncEnabled&&session?[passkeyOnThisDevice()
              ?{label:'🔑 Passkey on (this device)',onClick:()=>{}}
              :{label:'🔑 Set up a passkey',onClick:()=>{tryRegisterPasskey();}}]:[]),
          ]}/>
          <input ref=${fileRef} type="file" accept=".json" style=${{display:'none'}} onChange=${e=>{const f=e.target.files?.[0];if(f)importBackup(f,raw=>{
            if(!raw||!Array.isArray(raw.projects)){alert("That file doesn't look like a planner backup — nothing was imported.");return;}
            const s=normalizeState(raw);setState(s);setExpandedIds(expandedFromState(s));
          });e.target.value='';}}/>
          ${syncEnabled&&session&&html`<div style=${{display:'flex',alignItems:'center',gap:7,marginLeft:2}}>
            <span title=${syncStatus==='synced'?'Synced across devices':'Connecting…'} style=${{width:8,height:8,borderRadius:'50%',background:syncStatus==='synced'?'#5E9E5E':'#C9A227',flexShrink:0}}/>
            <${AddPasskeyButton}/>
            <button onClick=${()=>signOutSync()} title=${'Signed in as '+(session.user?.email||'')+' — sign out'}
              style=${{background:'none',border:'1px solid #E0D8D0',borderRadius:16,padding:'6px 12px',fontSize:12,color:'#7A7068',cursor:'pointer'}}>Sign out</button>
          </div>`}
        </div>
      </header>
      <div style=${{flex:1,display:'flex',overflow:'hidden',zoom}}>
        <${MasterPanel} projects=${projects} priorityIds=${priorityIds}
          onToggleDone=${masterToggleDone} onTogglePriority=${togglePriority}
          onToggleReminderDone=${masterToggleReminderDone} onToggleEventDone=${masterToggleEventDone}
          onReorderPriority=${reorderPriority} onEmptyCompleted=${emptyCompleted}
          completedExpanded=${completedExpanded}
          onToggleCompleted=${()=>upState({completedExpanded:!completedExpanded})}
          onAssignDay=${assignDayFromMaster} weeks=${weeksToShow}
          collapsed=${masterCollapsed} onToggleCollapse=${()=>setMasterCollapsed(p=>!p)} width=${masterWidth}/>
        ${!masterCollapsed&&html`<${PanelResizer} width=${masterWidth} setWidth=${setMasterWidth} dir=${1} min=${180} max=${560} zoom=${zoom}
          maxByWindow=${()=>window.innerWidth/zoom-(brainyCollapsed?30:brainWidth)-320}/>`}
        <div style=${{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <${WeekCalendar} projects=${projects} priorityIds=${priorityIds} weeks=${weeksToShow} onSetWeeks=${setWeeks}
            calendarEvents=${calendarEvents} onSaveCalendarEvent=${saveCalendarEvent} onDeleteCalendarEvent=${deleteCalendarEvent}
            calCollapsed=${calCollapsed} onToggleCalendar=${()=>setCalCollapsed(p=>!p)}
            calHeight=${calHeight} onSetCalHeight=${setCalHeight} zoom=${zoom}
            onAssignDay=${(tid,day,time,end,kind,endDate)=>{
              if(kind==='event'){
                const proj=projects.find(p=>(p.events||[]).some(e=>e.id===tid));
                if(proj)upProjects(projects.map(p=>p.id===proj.id?{...p,events:(p.events||[]).map(e=>{
                  if(e.id!==tid)return e;
                  // Picker passes an explicit last day (or null to clear); a
                  // day-to-day drag omits it — shift the span to keep its length.
                  const ne=endDate!==undefined?endDate
                    :(e.endDate&&e.dueDate&&day)
                      ?new Date(new Date(day).getTime()+(new Date(e.endDate).getTime()-new Date(e.dueDate).getTime())).toISOString().slice(0,10)
                      :null;
                  return{...e,dueDate:day,taskTime:time,endTime:end,endDate:ne};
                })}:p));
              } else if(kind==='reminder'){
                const proj=projects.find(p=>(p.reminders||[]).some(r=>r.id===tid));
                if(proj)upProjects(projects.map(p=>p.id===proj.id?{...p,reminders:(p.reminders||[]).map(r=>r.id===tid?{...r,dueDate:day,taskTime:time,endTime:end}:r)}:p));
              } else {
                const proj=projects.find(p=>p.tasks.some(t=>t.id===tid));
                if(proj)assignDayToTask(proj.id,tid,day,time,end);
              }
            }}/>
          <div style=${{flex:1,overflowY:'auto',overflowX:'hidden',padding:'16px 20px 40px'}}>
          ${addingProject&&html`<div style=${{background:'white',borderRadius:14,padding:'11px 15px',display:'flex',gap:10,alignItems:'center',boxShadow:'0 1px 4px rgba(0,0,0,0.07)',border:'1.5px solid #2A2825',marginBottom:12}}>
            <input autoFocus value=${newProjectName} onInput=${e=>setNewProjectName(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter')addProject();if(e.key==='Escape'){setAddingProject(false);setNewProjectName('');}}} placeholder="Project name…" style=${{flex:1,border:'none',outline:'none',fontSize:14,background:'none',color:'#2A2825'}}/>
            <button onClick=${addProject} style=${{background:'#2A2825',color:'white',border:'none',borderRadius:7,padding:'5px 12px',fontSize:12,cursor:'pointer'}}>Add</button>
            <button onClick=${()=>{setAddingProject(false);setNewProjectName('');}} style=${{background:'none',border:'none',color:'#9A9088',fontSize:18,lineHeight:1,cursor:'pointer'}}>×</button>
          </div>`}
          ${projects.length===0&&!addingProject&&html`<div style=${{textAlign:'center',padding:'60px 20px',color:'#B0A898',fontSize:13}}><div style=${{fontSize:26,marginBottom:12,opacity:0.4}}>▤</div>No projects yet — add one above.</div>`}
          <${DraggableProjects} projects=${projects} onReorder=${upProjects}
            renderProject=${(p)=>html`<${ProjectStrip} project=${p} onUpdate=${upProject} onDelete=${delProject} isExpanded=${expandedIds.has(p.id)} onToggle=${()=>toggleExp(p.id)} priorityIds=${priorityIds} onTogglePriority=${togglePriority} masterCollapsed=${masterCollapsed} openColorPickerId=${openColorPickerId} setOpenColorPickerId=${setOpenColorPickerId} weeks=${weeksToShow} onMoveNote=${moveNote} onCopyCopilot=${()=>copyTextToClipboard(buildCopilotText(state,[p.id]))}/>`}/>
          </div>
        </div>
        ${!brainyCollapsed&&html`<${PanelResizer} width=${brainWidth} setWidth=${setBrainWidth} dir=${-1} min=${240} max=${600} zoom=${zoom}
          maxByWindow=${()=>window.innerWidth/zoom-(masterCollapsed?28:masterWidth)-320}/>`}
        <${BrainySidebar} insights=${insights} projects=${projects}
          onAdd=${addInsightToPlanner} onAddToNote=${addInsightToExistingNote} onDismiss=${dismissInsight} onCapture=${addCapturedInsights}
          onReorder=${setInsights} width=${brainWidth}
          collapsed=${brainyCollapsed} onToggleCollapse=${()=>setBrainyCollapsed(p=>!p)}/>
      </div>
      ${copilotPicker&&html`<${CopilotCopyModal} projects=${projects}
        onCopy=${ids=>copyTextToClipboard(buildCopilotText(state,ids))}
        onClose=${()=>setCopilotPicker(false)}/>`}
    </div>`;
};

render(html`<${App}/>`, document.getElementById('root'));
</script>
</body>
</html>
